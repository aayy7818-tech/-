<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>باقات رقمية</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #e8758a;
    --blush: #f4b8c5;
    --petal: #fce8ec;
    --sage: #8aab8c;
    --leaf: #c8dfc9;
    --ivory: #fdf6f0;
    --deep: #3a1f28;
    --gold: #c9954a;
    --shadow: rgba(58,31,40,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Naskh Arabic', serif;
    background: var(--ivory);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background ── */
  .bg-wrap {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .bg-circle {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: .35;
  }
  .bg-circle.c1 { width:500px;height:500px; background:var(--blush); top:-120px; right:-100px; }
  .bg-circle.c2 { width:400px;height:400px; background:var(--leaf);  bottom:-80px; left:-80px; }
  .bg-circle.c3 { width:300px;height:300px; background:#f9dfa0;      top:40%; left:55%; }

  /* ── Layout ── */
  .container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:0 24px; }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 70px 20px 50px;
    animation: fadeDown .9s ease both;
  }
  .hero-icon {
    font-size: 64px;
    line-height: 1;
    margin-bottom: 18px;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(232,117,138,.4));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  h1 {
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 700;
    color: var(--deep);
    letter-spacing: -.5px;
    line-height: 1.2;
  }
  .subtitle {
    margin-top: 12px;
    font-size: 1.15rem;
    color: #7a5060;
    font-style: italic;
    letter-spacing: .4px;
  }

  /* ── CTA Buttons ── */
  .cta-row {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    margin-top: 36px;
    animation: fadeUp .9s .25s ease both;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 28px; border-radius: 50px; font-size: 1rem;
    font-family: inherit; cursor: pointer; border: none;
    font-weight: 600; transition: transform .18s, box-shadow .18s;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--rose), #d05070);
    color: #fff;
    box-shadow: 0 6px 20px rgba(208,80,112,.35);
  }
  .btn-secondary {
    background: #fff;
    color: var(--deep);
    box-shadow: 0 4px 16px var(--shadow);
    border: 1.5px solid var(--blush);
  }
  .btn-outline {
    background: transparent;
    color: var(--sage);
    border: 1.5px solid var(--sage);
    box-shadow: none;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px var(--shadow); }

  /* ── Section title ── */
  .section-title {
    text-align: center; margin-bottom: 32px;
    font-size: 1.5rem; font-weight: 700;
    color: var(--deep);
    position: relative;
  }
  .section-title::after {
    content:''; display:block; width:48px; height:3px;
    background: linear-gradient(90deg, var(--rose), var(--blush));
    margin: 8px auto 0; border-radius: 2px;
  }

  /* ── Builder ── */
  #builder { padding: 20px 0 60px; animation: fadeUp .9s .4s ease both; }

  /* tabs */
  .tabs { display:flex; gap:6px; justify-content:center; margin-bottom:28px; flex-wrap:wrap; }
  .tab {
    padding: 8px 20px; border-radius: 50px; font-family:inherit;
    font-size: .95rem; cursor:pointer; border: 1.5px solid var(--blush);
    background:#fff; color:#7a5060; font-weight:500; transition:.2s;
  }
  .tab.active, .tab:hover {
    background: var(--rose); color:#fff; border-color:var(--rose);
  }

  /* flower grid */
  .flower-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .flower-card {
    background: #fff;
    border-radius: 18px;
    padding: 18px 10px 14px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: 0 2px 12px var(--shadow);
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
    user-select: none;
  }
  .flower-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
  .flower-card.selected { border-color: var(--rose); background: var(--petal); }
  .flower-card .emoji { font-size: 2.6rem; display:block; margin-bottom:6px; }
  .flower-card .name { font-size: .88rem; color:#7a5060; font-weight:600; }
  .flower-card .count-badge {
    position:absolute; top:8px; left:8px;
    background: var(--rose); color:#fff;
    width:22px;height:22px; border-radius:50%;
    font-size:.75rem; font-weight:700;
    display:none; align-items:center; justify-content:center;
  }
  .flower-card.selected .count-badge { display:flex; }

  /* bouquet preview */
  .preview-box {
    background: #fff;
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 4px 32px var(--shadow);
    text-align: center;
    min-height: 200px;
    display: flex; flex-direction: column; align-items:center; justify-content:center;
    gap: 16px;
    margin-bottom: 24px;
    border: 1.5px solid var(--blush);
  }
  .preview-flowers {
    font-size: 2.8rem;
    line-height: 1.5;
    min-height: 60px;
    word-break: break-all;
    max-width: 400px;
  }
  .preview-placeholder { color: #c0a0aa; font-size: 1rem; }
  .preview-msg-input {
    width: 100%; max-width: 360px;
    border: 1.5px solid var(--blush); border-radius: 12px;
    padding: 10px 14px; font-family: inherit; font-size: 1rem;
    color: var(--deep); background: var(--ivory); outline:none;
    text-align:center;
  }
  .preview-msg-input:focus { border-color: var(--rose); }

  /* actions */
  .builder-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn-icon { font-size: 1.1rem; }

  /* ── Garden ── */
  #garden { padding: 20px 0 60px; animation: fadeUp .7s .1s ease both; }
  .garden-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }
  .garden-card {
    background: #fff; border-radius: 20px;
    padding: 24px 16px 20px;
    box-shadow: 0 3px 18px var(--shadow);
    text-align: center;
    border: 1.5px solid var(--blush);
    transition: transform .2s;
    position: relative;
  }
  .garden-card:hover { transform: translateY(-5px); }
  .garden-card .g-flowers { font-size: 2.2rem; margin-bottom:10px; word-break:break-all; }
  .garden-card .g-msg { font-size: .92rem; color:#7a5060; margin-bottom:8px; min-height:20px; }
  .garden-card .g-time { font-size:.75rem; color:#b0909a; }
  .garden-card .g-del {
    position:absolute; top:10px; left:10px;
    background:transparent; border:none; cursor:pointer;
    font-size:1rem; color:#c0a0aa; transition:.2s;
  }
  .garden-card .g-del:hover { color:var(--rose); }
  .empty-garden { text-align:center; color:#c0a0aa; padding:40px 0; font-size:1.1rem; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--deep); color:#fff; padding:12px 28px;
    border-radius:50px; font-size:.95rem; font-weight:600;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
    opacity:0; z-index:999; pointer-events:none;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ── Nav ── */
  nav {
    display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
    margin: 0 0 20px; animation: fadeDown .7s .1s ease both;
  }
  .nav-btn {
    padding:9px 22px; border-radius:50px; font-family:inherit;
    font-size:.95rem; cursor:pointer; border:1.5px solid transparent;
    font-weight:600; transition:.2s; background:#fff;
    color:#7a5060; border-color:var(--blush);
  }
  .nav-btn.active { background:var(--deep); color:#fff; border-color:var(--deep); }

  /* ── Footer ── */
  footer {
    text-align:center; padding:30px 0 50px;
    color:#b0909a; font-size:.88rem;
  }

  /* ── Animations ── */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:none} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:none} }

  /* ── Responsive ── */
  @media(max-width:500px){
    .flower-grid { grid-template-columns: repeat(3,1fr); gap:10px; }
    .flower-card .emoji { font-size:2rem; }
    .garden-grid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>
</div>

<!-- HEADER -->
<header>
  <span class="hero-icon">🌸</span>
  <h1>باقات رقمية</h1>
  <p class="subtitle">باقات جميلة تُهدى رقمياً</p>
  <div class="cta-row">
    <button class="btn btn-primary" onclick="showPage('builder')">🎨 بناء باقة</button>
    <button class="btn btn-secondary" onclick="showPage('garden')">🌿 عرض الحديقة</button>
  </div>
</header>

<div class="container">
  <nav>
    <button class="nav-btn active" id="nav-builder" onclick="showPage('builder')">🌺 بناء باقة</button>
    <button class="nav-btn" id="nav-garden"  onclick="showPage('garden')">🌿 الحديقة</button>
  </nav>

  <!-- ═══ BUILDER PAGE ═══ -->
  <div id="page-builder">
    <section id="builder">
      <p class="section-title">اختر زهورك</p>

      <!-- Category tabs -->
      <div class="tabs" id="tabs"></div>

      <!-- Flower grid -->
      <div class="flower-grid" id="flower-grid"></div>

      <!-- Preview -->
      <p class="section-title">باقتك</p>
      <div class="preview-box">
        <div class="preview-flowers" id="preview-flowers">
          <span class="preview-placeholder">اختر زهوراً من الأعلى لتبدأ</span>
        </div>
        <input class="preview-msg-input" id="msg-input"
               type="text" placeholder="✍️ اكتب رسالتك هنا..." maxlength="80" />
      </div>

      <div class="builder-actions">
        <button class="btn btn-primary" onclick="sendBouquet()">
          <span class="btn-icon">💌</span> إرسال الباقة
        </button>
        <button class="btn btn-secondary" onclick="saveToGarden()">
          <span class="btn-icon">🌿</span> حفظ في الحديقة
        </button>
        <button class="btn btn-outline" onclick="clearAll()">
          <span class="btn-icon">✕</span> مسح
        </button>
      </div>
    </section>
  </div>

  <!-- ═══ GARDEN PAGE ═══ -->
  <div id="page-garden" style="display:none">
    <section id="garden">
      <p class="section-title">حديقتك الرقمية</p>
      <div class="garden-grid" id="garden-grid"></div>
    </section>
  </div>
</div>

<footer>
  صُنع بـ 💗 — باقات رقمية
</footer>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────
const FLOWERS = [
  // ورود
  { id:'rose_red',    emoji:'🌹', name:'وردة حمراء',     cat:'ورود' },
  { id:'rose_pink',   emoji:'🌷', name:'وردة وردية',     cat:'ورود' },
  { id:'rose_white',  emoji:'🤍', name:'وردة بيضاء',     cat:'ورود' },
  { id:'rose_yellow', emoji:'💛', name:'وردة صفراء',     cat:'ورود' },
  { id:'sunflower',   emoji:'🌻', name:'عباد الشمس',     cat:'ورود' },
  { id:'hibiscus',    emoji:'🌺', name:'كِركِدِه',        cat:'ورود' },
  // طبيعة
  { id:'blossom',     emoji:'🌸', name:'زهرة الكرز',     cat:'طبيعة' },
  { id:'bouquet',     emoji:'💐', name:'باقة ملونة',     cat:'طبيعة' },
  { id:'four_leaf',   emoji:'🍀', name:'نبتة الحظ',      cat:'طبيعة' },
  { id:'leaf',        emoji:'🍃', name:'ورقة خضراء',     cat:'طبيعة' },
  { id:'herb',        emoji:'🌿', name:'أعشاب',          cat:'طبيعة' },
  { id:'mushroom',    emoji:'🍄', name:'فطر',            cat:'طبيعة' },
  // رومانسي
  { id:'heart_red',   emoji:'❤️', name:'قلب أحمر',       cat:'رومانسي' },
  { id:'heart_pink',  emoji:'🩷', name:'قلب وردي',       cat:'رومانسي' },
  { id:'heart_spark', emoji:'💖', name:'قلب متلألئ',     cat:'رومانسي' },
  { id:'sparkles',    emoji:'✨', name:'بريق',           cat:'رومانسي' },
  { id:'star',        emoji:'⭐', name:'نجمة',           cat:'رومانسي' },
  { id:'butterfly',   emoji:'🦋', name:'فراشة',          cat:'رومانسي' },
  // نادر
  { id:'lotus',       emoji:'🪷', name:'لوتس',           cat:'نادر' },
  { id:'seedling',    emoji:'🌱', name:'بذرة',           cat:'نادر' },
  { id:'cactus',      emoji:'🌵', name:'صبّار',          cat:'نادر' },
  { id:'snowflake',   emoji:'❄️', name:'ثلجة',           cat:'نادر' },
];

const CATS = ['الكل', ...new Set(FLOWERS.map(f => f.cat))];

// ── State ─────────────────────────────────────────────────
let selected = {};   // id -> count
let activeTab = 'الكل';

// ── Build UI ──────────────────────────────────────────────
function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = CATS.map(c =>
    `<button class="tab${c===activeTab?' active':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');
}

function buildGrid() {
  const el = document.getElementById('flower-grid');
  const filtered = activeTab === 'الكل' ? FLOWERS : FLOWERS.filter(f=>f.cat===activeTab);
  el.innerHTML = filtered.map(f => `
    <div class="flower-card${selected[f.id]?' selected':''}"
         onclick="toggleFlower('${f.id}')" id="card-${f.id}">
      <span class="emoji">${f.emoji}</span>
      <span class="name">${f.name}</span>
      <span class="count-badge" id="badge-${f.id}">${selected[f.id]||''}</span>
    </div>
  `).join('');
}

function setTab(cat) {
  activeTab = cat;
  buildTabs(); buildGrid();
}

// ── Flower logic ──────────────────────────────────────────
function toggleFlower(id) {
  selected[id] = (selected[id] || 0) + 1;
  if (selected[id] > 5) { delete selected[id]; }
  updatePreview();
  buildGrid();
}

function updatePreview() {
  const el = document.getElementById('preview-flowers');
  const all = Object.entries(selected)
    .flatMap(([id, count]) => {
      const f = FLOWERS.find(x=>x.id===id);
      return Array(count).fill(f ? f.emoji : '');
    });
  if (all.length === 0) {
    el.innerHTML = '<span class="preview-placeholder">اختر زهوراً من الأعلى لتبدأ</span>';
  } else {
    el.textContent = all.join(' ');
  }
}

function clearAll() {
  selected = {};
  document.getElementById('msg-input').value = '';
  updatePreview(); buildGrid();
  toast('تم المسح 🧹');
}

// ── Actions ───────────────────────────────────────────────
function getFlowerString() {
  return Object.entries(selected)
    .flatMap(([id,count])=>{const f=FLOWERS.find(x=>x.id===id);return Array(count).fill(f?f.emoji:'');})
    .join(' ');
}

function sendBouquet() {
  const flowers = getFlowerString();
  if (!flowers) { toast('❗ اختر زهرة واحدة على الأقل'); return; }
  const msg = document.getElementById('msg-input').value.trim();
  const text = msg ? `${flowers}\n${msg}` : flowers;
  if (navigator.share) {
    navigator.share({ title:'باقة رقمية 🌸', text })
      .catch(()=>{});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=> toast('تم النسخ! الصقها أينما تشاء 📋'));
  } else { toast('تم إنشاء الباقة! 🌸'); }
}

function saveToGarden() {
  const flowers = getFlowerString();
  if (!flowers) { toast('❗ اختر زهرة واحدة على الأقل'); return; }
  const msg = document.getElementById('msg-input').value.trim();
  const garden = JSON.parse(localStorage.getItem('garden') || '[]');
  garden.unshift({ flowers, msg, time: new Date().toLocaleDateString('ar-SA') });
  localStorage.setItem('garden', JSON.stringify(garden.slice(0, 20)));
  toast('تم الحفظ في الحديقة 🌿');
  clearAll();
}

// ── Garden ────────────────────────────────────────────────
function loadGarden() {
  const garden = JSON.parse(localStorage.getItem('garden') || '[]');
  const el = document.getElementById('garden-grid');
  if (garden.length === 0) {
    el.innerHTML = '<p class="empty-garden">حديقتك فارغة — ابنِ باقة واحفظها هنا 🌱</p>';
    return;
  }
  el.innerHTML = garden.map((g,i) => `
    <div class="garden-card">
      <button class="g-del" onclick="deleteFromGarden(${i})" title="حذف">✕</button>
      <div class="g-flowers">${g.flowers}</div>
      <div class="g-msg">${g.msg || ''}</div>
      <div class="g-time">${g.time}</div>
    </div>
  `).join('');
}

function deleteFromGarden(i) {
  const garden = JSON.parse(localStorage.getItem('garden') || '[]');
  garden.splice(i, 1);
  localStorage.setItem('garden', JSON.stringify(garden));
  loadGarden();
  toast('تم الحذف 🗑️');
}

// ── Navigation ────────────────────────────────────────────
function showPage(page) {
  document.getElementById('page-builder').style.display = page==='builder' ? '' : 'none';
  document.getElementById('page-garden').style.display  = page==='garden'  ? '' : 'none';
  document.getElementById('nav-builder').classList.toggle('active', page==='builder');
  document.getElementById('nav-garden').classList.toggle('active',  page==='garden');
  if (page === 'garden') loadGarden();
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=> el.classList.remove('show'), 2800);
}

// ── Init ──────────────────────────────────────────────────
buildTabs();
buildGrid();
</script>
</body>
</html>
